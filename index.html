<!-- =====================================================
  CAMPOGRAMA POR EQUIPO - REAL MADRID CANTERA
  Sistema: MAESTRO CORPORATIVO RM
  Stack: HTML + CSS + JS puro
  Persistencia: Firestore (con caché offline IndexedDB)
  Auth: anónima
  Concurrencia: optimistic locking con campo `version` + transaction
===================================================== -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campograma - Cantera RM</title>
<style>
/* =====================================================
  1. VARIABLES CORPORATIVAS (MAESTRO RM)
===================================================== */
:root{
  --bg:#f0f2f5;
  --surface:#ffffff;
  --surface-alt:#fafbfc;
  --border:#dfe1e6;
  --border-light:#eaecf0;
  --text:#1a1d23;
  --text-sec:#5a6170;
  --text-mut:#8b919e;
  --text-faint:#b4b9c4;
  --rm-blue:#2563eb;
  --rm-blue-lt:#3b7cf5;
  --rm-blue-bg:#edf1fc;
  --green:#16a34a;
  --orange:#ea580c;
  --red:#dc2626;
  --sh-sm:0 1px 3px rgba(0,0,0,.06);
  --sh-md:0 2px 8px rgba(0,0,0,.08);
  --sh-lg:0 4px 16px rgba(0,0,0,.12);
  --r:8px;
  --rs:5px;
  --rl:12px;
  --font:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
  --tr:.2s ease;
  --pitch-grass:#3a8a3f;
  --pitch-grass-alt:#338539;
  --pitch-line:rgba(255,255,255,.85);
}
body.dark{
  --bg:#1a1d23;
  --surface:#23272f;
  --surface-alt:#2a2e36;
  --border:#3a3f4a;
  --border-light:#32363e;
  --text:#e4e6ea;
  --text-sec:#a0a5b0;
  --text-mut:#707580;
  --text-faint:#505560;
  --rm-blue-bg:#1e2a4a;
  --sh-sm:0 1px 3px rgba(0,0,0,.2);
  --sh-md:0 2px 8px rgba(0,0,0,.3);
  --sh-lg:0 4px 16px rgba(0,0,0,.4);
  --pitch-grass:#2d6a32;
  --pitch-grass-alt:#28602d;
}
/* =====================================================
  2. RESET
===================================================== */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  line-height:1.45;
  font-size:13px;
  -webkit-font-smoothing:antialiased;
  padding-bottom:54px;
  overscroll-behavior:none;
}
button{font-family:inherit}
input,select{font-family:inherit}

/* =====================================================
  3. HEADER CORPORATIVO
===================================================== */
.header{
  background:var(--rm-blue);
  padding:12px 24px;
  display:flex;align-items:center;gap:14px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.header-logo{
  width:38px;height:38px;border-radius:50%;
  background:#fff;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;overflow:hidden;padding:3px;
  font-weight:700;color:var(--rm-blue);font-size:14px;
}
.header-title-wrap{display:flex;align-items:baseline;gap:10px;min-width:0;flex:1}
.doc-title{font-size:17px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.3px}
.doc-season{font-size:13px;font-weight:500;color:rgba(255,255,255,.72);white-space:nowrap}

.sync-indicator{
  display:flex;align-items:center;gap:6px;
  font-size:11px;font-weight:500;color:rgba(255,255,255,.85);
  padding:4px 10px;border-radius:14px;
  background:rgba(255,255,255,.12);
  white-space:nowrap;flex-shrink:0;
  transition:background var(--tr);cursor:default;
}
.sync-indicator.is-saving{background:rgba(255,255,255,.2)}
.sync-indicator.is-error  {background:rgba(220,38,38,.85);color:#fff}
.sync-indicator.is-conflict{background:rgba(234,88,12,.9);color:#fff;cursor:pointer}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#16a34a;flex-shrink:0}
.sync-indicator.is-saving .sync-dot{background:#fbbf24;animation:pulse 1s ease-in-out infinite}
.sync-indicator.is-error   .sync-dot{background:#fff}
.sync-indicator.is-conflict .sync-dot{background:#fff}
.sync-indicator.is-offline .sync-dot{background:#fbbf24}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.btn-dark{
  width:28px;height:28px;border-radius:50%;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.12);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;transition:all var(--tr);
}
.btn-dark:hover{background:rgba(255,255,255,.25)}

/* =====================================================
  4. BARRA DE EQUIPOS
===================================================== */
.team-bar{
  background:var(--surface);
  padding:10px 24px;
  display:flex;align-items:center;gap:5px;
  overflow-x:auto;
  position:sticky;top:62px;z-index:99;
  border-bottom:1px solid var(--border);
}
.team-bar::-webkit-scrollbar{height:0}
.team-btn{
  padding:5px 14px;font-size:11px;font-weight:600;
  border:1.5px solid var(--border);border-radius:20px;
  background:var(--surface);color:var(--text-sec);
  cursor:pointer;white-space:nowrap;transition:all var(--tr);
}
.team-btn:hover{border-color:var(--rm-blue);color:var(--rm-blue)}
.team-btn.active{background:var(--rm-blue);color:#fff;border-color:var(--rm-blue)}
.team-btn:disabled{opacity:.4;cursor:wait}

/* =====================================================
  5. MAIN LAYOUT
===================================================== */
.main{max-width:1600px;margin:0 auto;padding:16px 24px}

.team-summary{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:12px 16px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;
  gap:14px;flex-wrap:wrap;box-shadow:var(--sh-sm);
}
.team-summary-name{font-size:15px;font-weight:700;color:var(--text)}
.team-summary-name small{display:block;font-size:11px;font-weight:500;color:var(--text-mut);margin-top:2px}
.counter{font-size:13px;font-weight:600;color:var(--text-sec);display:flex;align-items:center;gap:8px}
.counter-pill{
  background:var(--rm-blue-bg);color:var(--rm-blue);
  padding:4px 10px;border-radius:14px;font-weight:700;
  font-variant-numeric:tabular-nums;
}

.layout{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:16px;align-items:start}
@media(max-width:980px){.layout{grid-template-columns:1fr}}

/* =====================================================
  6. CAMPO
===================================================== */
.pitch-wrap{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:14px;box-shadow:var(--sh-sm);
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.pitch-toolbar{
  width:100%;display:flex;justify-content:space-between;align-items:center;
  font-size:11px;color:var(--text-mut);
}
.pitch-toolbar .hint{font-style:italic}
.pitch{
  position:relative;width:100%;max-width:520px;aspect-ratio:2/3;
  background:linear-gradient(180deg,
    var(--pitch-grass) 0%,var(--pitch-grass-alt) 12.5%,
    var(--pitch-grass) 25%,var(--pitch-grass-alt) 37.5%,
    var(--pitch-grass) 50%,var(--pitch-grass-alt) 62.5%,
    var(--pitch-grass) 75%,var(--pitch-grass-alt) 87.5%,
    var(--pitch-grass) 100%);
  border-radius:var(--rs);overflow:hidden;
  touch-action:none;user-select:none;-webkit-user-select:none;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.6);
}
.pitch.drop-target{outline:3px dashed var(--rm-blue);outline-offset:-3px}
.pitch.is-locked{opacity:.5;pointer-events:none}
.pitch-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

/* =====================================================
  7. FICHAS
===================================================== */
.chip{
  position:absolute;width:11%;aspect-ratio:1/1;border-radius:50%;
  background:var(--chip-color,#2563eb);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;border:2px solid #fff;
  box-shadow:0 2px 6px rgba(0,0,0,.35);
  cursor:grab;touch-action:none;
  transform:translate(-50%,-50%);
  transition:box-shadow var(--tr),transform .1s ease;
  z-index:1;
}
.chip.dragging{cursor:grabbing;z-index:10;box-shadow:0 6px 14px rgba(0,0,0,.45);transform:translate(-50%,-50%) scale(1.08)}
.chip.selected{outline:3px solid #ffd400;outline-offset:1px;z-index:5}
.chip.is-baja{opacity:.45;filter:grayscale(.4)}
.chip-text{pointer-events:none;text-shadow:0 1px 2px rgba(0,0,0,.4);max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip-r{
  position:absolute;top:-3px;right:-3px;
  width:42%;height:42%;background:#fff;color:#1a1d23;
  border-radius:50%;font-size:9px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  border:1.5px solid var(--chip-color,#2563eb);pointer-events:none;
}
.chip-role-por::after{
  content:'';position:absolute;inset:-4px;
  border:2px dashed rgba(255,255,255,.7);border-radius:50%;pointer-events:none;
}
.roster-chip{position:relative;width:36px;height:36px;flex-shrink:0}

/* =====================================================
  8. PANEL LATERAL
===================================================== */
.side-panel{display:flex;flex-direction:column;gap:12px;min-width:0}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-sm);overflow:hidden}
.card-h{
  padding:10px 14px;background:var(--surface-alt);
  border-bottom:1px solid var(--border);
  font-size:12px;font-weight:700;color:var(--text-sec);
  letter-spacing:.3px;text-transform:uppercase;
  display:flex;justify-content:space-between;align-items:center;
}
.card-h .count{
  background:var(--surface);color:var(--text-sec);
  padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;
  border:1px solid var(--border);
}
.card-b{padding:10px 12px}

.roster-list{display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto;min-height:50px}
.roster-item{
  display:flex;align-items:center;gap:10px;
  padding:6px;border-radius:var(--rs);
  background:var(--surface-alt);border:1px solid var(--border-light);
  cursor:pointer;transition:background var(--tr),border-color var(--tr);
}
.roster-item:hover{background:var(--rm-blue-bg);border-color:var(--rm-blue)}
.roster-item.selected{border-color:var(--rm-blue);box-shadow:0 0 0 1px var(--rm-blue)}
.roster-item.on-pitch{opacity:.55}
.roster-item-info{flex:1;min-width:0}
.roster-item-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.roster-item-meta{font-size:10px;color:var(--text-mut);margin-top:1px}
.roster-empty{text-align:center;font-size:11px;color:var(--text-mut);padding:14px 6px;font-style:italic}

.form-row{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.form-row label{font-size:10px;font-weight:700;color:var(--text-mut);letter-spacing:.3px;text-transform:uppercase}
.form-row input[type="text"],.form-row select{
  width:100%;padding:6px 8px;font-size:12px;
  border:1px solid var(--border);border-radius:var(--rs);
  background:var(--surface);color:var(--text);transition:border-color var(--tr);
}
.form-row input[type="text"]:focus,.form-row select:focus{outline:none;border-color:var(--rm-blue)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.toggle-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.toggle-row input{width:16px;height:16px;accent-color:var(--rm-blue)}
.toggle-row label{font-size:12px;color:var(--text);font-weight:500}

.btn-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.btn{
  padding:6px 12px;font-size:11px;font-weight:600;
  border-radius:var(--rs);border:1px solid var(--border);
  background:var(--surface);color:var(--text);cursor:pointer;
  transition:all var(--tr);
}
.btn:hover{border-color:var(--rm-blue);color:var(--rm-blue)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--rm-blue);color:#fff;border-color:var(--rm-blue)}
.btn-primary:hover{background:var(--rm-blue-lt);color:#fff;border-color:var(--rm-blue-lt)}
.btn-danger{color:var(--red);border-color:var(--border)}
.btn-danger:hover{background:var(--red);color:#fff;border-color:var(--red)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text-mut)}
.btn-ghost:hover{color:var(--rm-blue);background:var(--rm-blue-bg)}

.empty-state{font-size:11px;color:var(--text-mut);font-style:italic;text-align:center;padding:8px 4px}

.color-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px}
.color-row label{flex:1;color:var(--text-sec);font-weight:500}
.color-row input[type="color"]{
  width:30px;height:24px;border:1px solid var(--border);
  border-radius:var(--rs);cursor:pointer;background:none;padding:1px;
}
.btn-reset-colors{font-size:10px;color:var(--text-mut);background:none;border:none;cursor:pointer;text-decoration:underline;margin-top:4px}
.btn-reset-colors:hover{color:var(--rm-blue)}

/* =====================================================
  9. FOOTER
===================================================== */
.app-footer{
  background:var(--rm-blue);color:rgba(255,255,255,.5);
  font-size:10px;letter-spacing:.3px;text-align:center;
  padding:12px 24px;position:fixed;left:0;right:0;bottom:0;z-index:50;
}

/* Modal de conflicto */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;
}
.modal{background:var(--surface);border-radius:var(--r);max-width:420px;width:100%;box-shadow:var(--sh-lg);overflow:hidden}
.modal-h{padding:14px 18px;background:var(--orange);color:#fff;font-weight:700;font-size:14px}
.modal-b{padding:16px 18px;color:var(--text);font-size:13px;line-height:1.5}
.modal-f{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* =====================================================
  10. RESPONSIVE
===================================================== */
@media(max-width:640px){
  .header{padding:8px 12px;gap:10px}
  .header-logo{width:34px;height:34px}
  .doc-title{font-size:14px}
  .doc-season{font-size:11px}
  .sync-indicator{font-size:10px;padding:3px 8px}
  .team-bar{padding:8px 12px;top:54px}
  .main{padding:10px 12px}
  .app-footer{padding:10px 12px;font-size:9px}
  .chip{width:13%}
  .pitch-toolbar{font-size:10px}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">RM</div>
  <div class="header-title-wrap">
    <h1 class="doc-title">Campograma</h1>
    <span class="doc-season">2026/2027</span>
  </div>
  <div class="sync-indicator" id="syncIndicator" title="Estado de sincronización">
    <span class="sync-dot"></span>
    <span id="syncLabel">Conectando…</span>
  </div>
  <button class="btn-dark" onclick="toggleDark()" id="darkBtn">☾</button>
</header>

<div class="team-bar" id="teamBar"></div>

<main class="main">
  <div class="team-summary">
    <div class="team-summary-name" id="teamName">—<small id="teamKeyLabel">—</small></div>
    <div class="counter">
      Jugadores en campo:
      <span class="counter-pill" id="counterPill">0 + 0</span>
    </div>
  </div>

  <div class="layout">
    <div class="pitch-wrap">
      <div class="pitch-toolbar">
        <span class="hint">Arrastra fichas para moverlas · Doble clic para sacar del campo</span>
      </div>
      <div class="pitch" id="pitch">
        <svg class="pitch-svg" viewBox="0 0 200 300" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="196" height="296" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="1.5"/>
          <line x1="2" y1="150" x2="198" y2="150" stroke="rgba(255,255,255,.85)" stroke-width="1.5"/>
          <circle cx="100" cy="150" r="22" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="1.5"/>
          <circle cx="100" cy="150" r="1.5" fill="rgba(255,255,255,.85)"/>
          <rect x="42" y="2" width="116" height="49" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="1.5"/>
          <rect x="68" y="2" width="64" height="18" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="1.5"/>
          <circle cx="100" cy="35" r="1.5" fill="rgba(255,255,255,.85)"/>
          <path d="M 84 51 A 16 16 0 0 0 116 51" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="1.5"/>
          <rect x="86" y="0" width="28" height="3" fill="rgba(255,255,255,.5)"/>
          <rect x="42" y="249" width="116" height="49" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="1.5"/>
          <rect x="68" y="280" width="64" height="18" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="1.5"/>
          <circle cx="100" cy="265" r="1.5" fill="rgba(255,255,255,.85)"/>
          <path d="M 84 249 A 16 16 0 0 1 116 249" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="1.5"/>
          <rect x="86" y="297" width="28" height="3" fill="rgba(255,255,255,.5)"/>
          <path d="M 2 5 A 3 3 0 0 1 5 2" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="1"/>
          <path d="M 195 2 A 3 3 0 0 1 198 5" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="1"/>
          <path d="M 2 295 A 3 3 0 0 0 5 298" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="1"/>
          <path d="M 195 298 A 3 3 0 0 0 198 295" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="1"/>
        </svg>
      </div>
    </div>

    <aside class="side-panel">
      <div class="card">
        <div class="card-h">Plantilla actual<span class="count" id="countActual">0</span></div>
        <div class="card-b"><div class="roster-list" id="rosterActual" data-bucket="actual"></div></div>
      </div>
      <div class="card">
        <div class="card-h">Futuribles<span class="count" id="countFuturible">0</span></div>
        <div class="card-b"><div class="roster-list" id="rosterFuturible" data-bucket="futurible"></div></div>
      </div>
      <div class="card">
        <div class="card-h">Ficha</div>
        <div class="card-b" id="editorBody">
          <div class="empty-state" id="editorEmpty">Selecciona una ficha para editar o crea una nueva.</div>
          <div id="editorForm" style="display:none">
            <div class="form-row"><label>Nombre</label><input type="text" id="fName" maxlength="40"></div>
            <div class="form-grid">
              <div class="form-row"><label>Dorsal / texto</label><input type="text" id="fShort" maxlength="3"></div>
              <div class="form-row">
                <label>Rol</label>
                <select id="fRole"><option value="CAMPO">CAMPO</option><option value="POR">POR</option></select>
              </div>
            </div>
            <div class="form-row">
              <label>Estado</label>
              <select id="fStatus">
                <option value="actual">Jugador actual</option>
                <option value="nuevo_fichado">Nuevo fichado</option>
                <option value="futurible">Futurible</option>
                <option value="baja">Baja</option>
              </select>
            </div>
            <div class="toggle-row"><input type="checkbox" id="fResidence"><label for="fResidence">Residencia (R)</label></div>
            <div class="btn-row">
              <button class="btn btn-danger" id="btnDelete">Eliminar</button>
              <button class="btn btn-ghost" id="btnDeselect">Deseleccionar</button>
            </div>
          </div>
          <div class="btn-row">
            <button class="btn btn-primary" id="btnNew">+ Añadir ficha</button>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-h">Colores por estado</div>
        <div class="card-b" id="colorConfig"></div>
      </div>
    </aside>
  </div>
</main>

<footer class="app-footer">Cantera del Real Madrid CF · Campograma</footer>

/* =====================================================
  INDICADOR DE SYNC
===================================================== */
var syncState = { status:'connecting' };
function setSync(status, msg){
  syncState.status = status;
  var el  = document.getElementById('syncIndicator');
  var lbl = document.getElementById('syncLabel');
  el.classList.remove('is-saving','is-error','is-conflict','is-offline');
  var labels = {
    connecting:'Conectando…', saved:'Guardado',
    saving:'Guardando…', offline:'Sin conexión',
    error:'Error', conflict:'Conflicto'
  };
  lbl.textContent = msg || labels[status] || status;
  if(status === 'saving')    el.classList.add('is-saving');
  if(status === 'error')     el.classList.add('is-error');
  if(status === 'conflict')  el.classList.add('is-conflict');
  if(status === 'offline')   el.classList.add('is-offline');
}

/* =====================================================
  PERSISTENCIA
  -----------------------------------------------------
  campogramas/{teamKey} = { teamKey, players[], version, updatedAt, updatedBy }
  config/global         = { colors:{...}, updatedAt }

  Concurrencia: optimistic locking con `version` + transaction.
===================================================== */
function teamDoc(teamKey){ return db.collection('campogramas').doc(teamKey); }
function configDoc(){      return db.collection('config').doc('global'); }

function loadGlobalConfig(){
  return configDoc().get().then(function(snap){
    if(snap.exists){
      var data = snap.data();
      return (data && data.colors) || null;
    }
    return null;
  });
}
function saveGlobalConfig(colors){
  return configDoc().set({
    colors: colors,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
}
function loadTeamState(teamKey){
  return teamDoc(teamKey).get().then(function(snap){
    if(!snap.exists) return null;
    return snap.data();
  });
}
// Devuelve { ok:true, version:N } o { ok:false, reason:'conflict', remote }
function saveTeamStateTx(localState){
  var docRef = teamDoc(localState.teamKey);
  var expectedVersion = localState.version || 0;
  return db.runTransaction(function(tx){
    return tx.get(docRef).then(function(snap){
      var remoteVersion = snap.exists ? (snap.data().version || 0) : 0;
      if(remoteVersion !== expectedVersion){
        return { ok:false, reason:'conflict', remote: snap.exists ? snap.data() : null };
      }
      var newVersion = expectedVersion + 1;
      var payload = {
        teamKey:   localState.teamKey,
        players:   localState.players || [],
        version:   newVersion,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedBy: (firebase.auth().currentUser && firebase.auth().currentUser.uid) || 'anon'
      };
      tx.set(docRef, payload);
      return { ok:true, version:newVersion };
    });
  });
}

/* =====================================================
  GUARDADO CON DEBOUNCE
===================================================== */
function scheduleSave(){
  if(!state) return;
  setSync('saving');
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSave, SAVE_DEBOUNCE_MS);
}
function flushSave(){
  if(!state) return;
  if(saveInFlight){ pendingSave = true; return; }
  saveInFlight = true;
  var snapshot = JSON.parse(JSON.stringify(state));
  saveTeamStateTx(snapshot).then(function(res){
    saveInFlight = false;
    if(res.ok){
      state.version = res.version;
      setSync('saved');
      if(pendingSave){ pendingSave = false; scheduleSave(); }
    } else if(res.reason === 'conflict'){
      setSync('conflict');
      handleConflict(res.remote);
    }
  }).catch(function(err){
    saveInFlight = false;
    console.error('saveTeamState failed', err);
    if(!navigator.onLine){
      setSync('offline');
    } else {
      setSync('error', 'Error: ' + (err.code || 'desconocido'));
    }
    if(pendingSave){ pendingSave = false; scheduleSave(); }
  });
}

/* =====================================================
  CONFLICTO
===================================================== */
function handleConflict(remote){
  if(conflictModal) return;
  var backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML =
    '<div class="modal">' +
      '<div class="modal-h">⚠ Conflicto detectado</div>' +
      '<div class="modal-b">' +
        'Otra persona ha editado este equipo mientras tú trabajabas. ' +
        'Para evitar pisar su trabajo, elige una opción:' +
      '</div>' +
      '<div class="modal-f">' +
        '<button class="btn" id="btnForceMine">Forzar mi versión</button>' +
        '<button class="btn btn-primary" id="btnTakeRemote">Cargar versión actualizada</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(backdrop);
  conflictModal = backdrop;

  document.getElementById('btnTakeRemote').addEventListener('click', function(){
    state = {
      teamKey: (remote && remote.teamKey) || activeTeam,
      players: (remote && remote.players) || [],
      version: (remote && remote.version) || 0
    };
    selectedId = null;
    closeConflictModal();
    setSync('saved');
    renderAll();
  });
  document.getElementById('btnForceMine').addEventListener('click', function(){
    state.version = (remote && remote.version) || state.version;
    closeConflictModal();
    scheduleSave();
  });
}
function closeConflictModal(){
  if(conflictModal && conflictModal.parentNode){
    conflictModal.parentNode.removeChild(conflictModal);
  }
  conflictModal = null;
}

/* =====================================================
  ARRANQUE
===================================================== */
function bootstrap(){
  setSync('connecting');
  firebase.auth().signInAnonymously().then(function(){
    return loadGlobalConfig();
  }).then(function(savedColors){
    statusColors = {};
    Object.keys(PLAYER_STATUS_DEFAULT).forEach(function(k){
      statusColors[k] = (savedColors && savedColors[k]) ? savedColors[k] : PLAYER_STATUS_DEFAULT[k].color;
    });
    renderColorConfig();
    bindEditor();
    restoreDark();
    renderTeamBar();
    renderTeamSummary();
    return switchTeam(activeTeam);
  }).catch(function(err){
    console.error('Bootstrap fallido', err);
    setSync('error', 'Error al iniciar (¿reglas Firestore?)');
  });
}

function switchTeam(teamKey){
  if(teamLoading) return Promise.resolve();
  teamLoading = true;
  activeTeam = teamKey;
  localStorage.setItem('campograma_active_team', teamKey);
  selectedId = null;
  renderTeamBar();
  renderTeamSummary();

  state = null;
  document.getElementById('pitch').classList.add('is-locked');
  renderRoster(true);
  renderPitchChips();
  renderEditor();
  renderCounter();

  setSync('saving', 'Cargando…');
  return loadTeamState(teamKey).then(function(loaded){
    if(loaded){
      state = {
        teamKey: loaded.teamKey || teamKey,
        players: loaded.players || [],
        version: loaded.version || 0
      };
    } else {
      state = { teamKey:teamKey, players:[], version:0 };
    }
    teamLoading = false;
    document.getElementById('pitch').classList.remove('is-locked');
    setSync('saved');
    renderAll();
  }).catch(function(err){
    teamLoading = false;
    document.getElementById('pitch').classList.remove('is-locked');
    console.error('loadTeamState failed', err);
    setSync('error', 'Error al cargar');
  });
}

  TEAMS.forEach(function(t){
    html += '<button class="team-btn ' + (t.key === activeTeam ? 'active' : '') + '"'
         +  ' data-team="' + t.key + '" title="' + t.name + '"'

/* =====================================================
  FICHAS
===================================================== */
function uid(){ return 'p_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,7); }

function createPlayer(){
  if(!state) return;
  var p = {
    id: uid(),
    name: 'Jugador',
    shortText: String(state.players.length + 1),
    role: 'CAMPO',
    status: 'actual',
    residence: false,
    onPitch: false,
    x: 50, y: 50
  };
  state.players.push(p);
  selectedId = p.id;
  scheduleSave();
  renderRoster(); renderPitchChips(); renderEditor(); renderCounter();
}
function deletePlayer(id){
  if(!state) return;
  state.players = state.players.filter(function(p){ return p.id !== id; });
  if(selectedId === id) selectedId = null;
  scheduleSave();
  renderRoster(); renderPitchChips(); renderEditor(); renderCounter();
}
function getPlayer(id){
  if(!state) return null;
  return state.players.find(function(p){ return p.id === id; });
}
function updatePlayer(id, patch){
  var p = getPlayer(id);
  if(!p) return;
  Object.keys(patch).forEach(function(k){ p[k] = patch[k]; });
  if(p.status === 'baja' && p.onPitch) p.onPitch = false;
  scheduleSave();
  renderRoster(); renderPitchChips(); renderCounter();
}

/* =====================================================
  ÁREAS Y CONTADOR
===================================================== */
function isInGoalArea(x, y){
  var t = PITCH_ZONES.topGoalBox, b = PITCH_ZONES.bottomGoalBox;
  if(x >= t.x1 && x <= t.x2 && y >= t.y1 && y <= t.y2) return true;
  if(x >= b.x1 && x <= b.x2 && y >= b.y1 && y <= b.y2) return true;
  return false;
}
function countOnPitch(){
  var campo = 0, por = 0;
  if(!state) return { campo:0, por:0 };
  state.players.forEach(function(p){
    if(!p.onPitch || p.status === 'baja') return;
    if(p.role === 'POR' && isInGoalArea(p.x, p.y)) por++;
    else campo++;
  });
  return { campo:campo, por:por };
}
function renderCounter(){
  var c = countOnPitch();
  document.getElementById('counterPill').textContent = c.campo + ' + ' + c.por;
}

/* =====================================================
  RENDER: ROSTER
===================================================== */
function renderRoster(isLoading){
  var actualBox = document.getElementById('rosterActual');
  var futurBox  = document.getElementById('rosterFuturible');
  actualBox.innerHTML = '';
  futurBox.innerHTML  = '';

  if(isLoading || !state){
    actualBox.innerHTML = '<div class="roster-empty">Cargando…</div>';
    futurBox.innerHTML  = '<div class="roster-empty">Cargando…</div>';
    document.getElementById('countActual').textContent = '–';
    document.getElementById('countFuturible').textContent = '–';
    return;
  }

  var actual = [], futurible = [];
  state.players.forEach(function(p){
    if(p.status === 'futurible') futurible.push(p);
    else actual.push(p);
  });

  function renderItem(p){
    var item = document.createElement('div');
    item.className = 'roster-item' + (p.id === selectedId ? ' selected' : '') + (p.onPitch ? ' on-pitch' : '');
    item.dataset.id = p.id;

    var chip = document.createElement('div');
    chip.className = 'roster-chip chip' + (p.role === 'POR' ? ' chip-role-por' : '') + (p.status === 'baja' ? ' is-baja' : '');
    chip.style.position = 'relative';
    chip.style.transform = 'none';
    chip.style.setProperty('--chip-color', statusColors[p.status]);
    chip.style.background = statusColors[p.status];
    chip.innerHTML = '<span class="chip-text">' + escapeHtml(p.shortText || '') + '</span>'
                   + (p.residence ? '<span class="chip-r">R</span>' : '');

    var info = document.createElement('div');
    info.className = 'roster-item-info';
    var statusLabel = PLAYER_STATUS_DEFAULT[p.status].label;
    info.innerHTML = '<div class="roster-item-name">' + escapeHtml(p.name) + '</div>'
                   + '<div class="roster-item-meta">' + p.role + ' · ' + statusLabel + (p.onPitch ? ' · en campo' : '') + '</div>';
    item.appendChild(chip);
    item.appendChild(info);

    item.addEventListener('click', function(){
      selectedId = p.id;
      renderRoster(); renderEditor(); renderPitchChips();
    });
    chip.addEventListener('pointerdown', function(ev){
      startDragFromRoster(ev, p.id);
    });
    return item;
  }

  if(actual.length === 0) actualBox.innerHTML = '<div class="roster-empty">Sin jugadores. Pulsa "+ Añadir ficha".</div>';
  else actual.forEach(function(p){ actualBox.appendChild(renderItem(p)); });
  if(futurible.length === 0) futurBox.innerHTML = '<div class="roster-empty">Sin futuribles.</div>';
  else futurible.forEach(function(p){ futurBox.appendChild(renderItem(p)); });

  document.getElementById('countActual').textContent = actual.length;
  document.getElementById('countFuturible').textContent = futurible.length;
}

/* =====================================================
  RENDER: CHIPS EN EL CAMPO
===================================================== */
function renderPitchChips(){
  var pitch = document.getElementById('pitch');
  pitch.querySelectorAll('.chip').forEach(function(c){ c.remove(); });
  if(!state) return;
  state.players.forEach(function(p){
    if(!p.onPitch) return;
    var chip = document.createElement('div');
    chip.className = 'chip' + (p.role === 'POR' ? ' chip-role-por' : '')
                  + (p.status === 'baja' ? ' is-baja' : '')
                  + (p.id === selectedId ? ' selected' : '');
    chip.style.left = p.x + '%';
    chip.style.top  = p.y + '%';
    chip.style.setProperty('--chip-color', statusColors[p.status]);
    chip.style.background = statusColors[p.status];
    chip.dataset.id = p.id;
    chip.innerHTML = '<span class="chip-text">' + escapeHtml(p.shortText || '') + '</span>'
                   + (p.residence ? '<span class="chip-r">R</span>' : '');
    chip.addEventListener('pointerdown', function(ev){
      startDragOnPitch(ev, p.id);
    });
    pitch.appendChild(chip);
  });
}

/* =====================================================
  RENDER: EDITOR
===================================================== */
function renderEditor(){
  var empty = document.getElementById('editorEmpty');
  var form  = document.getElementById('editorForm');
  if(!selectedId || !state){
    empty.style.display = 'block'; form.style.display = 'none';
    return;
  }
  var p = getPlayer(selectedId);
  if(!p){
    selectedId = null;
    empty.style.display = 'block'; form.style.display = 'none';
    return;
  }
  empty.style.display = 'none'; form.style.display = 'block';
  document.getElementById('fName').value         = p.name;
  document.getElementById('fShort').value        = p.shortText;
  document.getElementById('fRole').value         = p.role;
  document.getElementById('fStatus').value       = p.status;
  document.getElementById('fResidence').checked  = !!p.residence;
}
function bindEditor(){
  document.getElementById('fName').addEventListener('input', function(){
    if(!selectedId) return; updatePlayer(selectedId, { name: this.value });
  });
  document.getElementById('fShort').addEventListener('input', function(){
    if(!selectedId) return; updatePlayer(selectedId, { shortText: this.value });
  });
  document.getElementById('fRole').addEventListener('change', function(){
    if(!selectedId) return; updatePlayer(selectedId, { role: this.value });
  });
  document.getElementById('fStatus').addEventListener('change', function(){
    if(!selectedId) return; updatePlayer(selectedId, { status: this.value });
  });
  document.getElementById('fResidence').addEventListener('change', function(){
    if(!selectedId) return; updatePlayer(selectedId, { residence: this.checked });
  });
  document.getElementById('btnDelete').addEventListener('click', function(){
    if(!selectedId) return;
    if(confirm('¿Eliminar esta ficha?')) deletePlayer(selectedId);
  });
  document.getElementById('btnDeselect').addEventListener('click', function(){
    selectedId = null; renderRoster(); renderPitchChips(); renderEditor();
  });
  document.getElementById('btnNew').addEventListener('click', createPlayer);
}

  COLORES GLOBALES

function renderColorConfig(){
  var box = document.getElementById('colorConfig');
  box.innerHTML = '';
  Object.keys(PLAYER_STATUS_DEFAULT).forEach(function(k){
    var row = document.createElement('div');
    row.className = 'color-row';

                  + '<input type="color" value="' + statusColors[k] + '" data-status="' + k + '">';
    box.appendChild(row);
  });

  reset.className = 'btn-reset-colors';

  box.appendChild(reset);

    inp.addEventListener('input', function(){
      var s = this.getAttribute('data-status');
      statusColors[s] = this.value;

      renderRoster(); renderPitchChips();
    });

  reset.addEventListener('click', function(){
    Object.keys(PLAYER_STATUS_DEFAULT).forEach(function(k){
      statusColors[k] = PLAYER_STATUS_DEFAULT[k].color;
    });
    saveGlobalConfig(statusColors).catch(function(e){ console.warn(e); });
    renderColorConfig(); renderRoster(); renderPitchChips();
  });
}

/* =====================================================
  DRAG & DROP (Pointer Events)
===================================================== */
var DRAG_THRESHOLD = 5;

function startDragOnPitch(ev, playerId){
  if(!state) return;
  ev.preventDefault();
  var p = getPlayer(playerId);
  if(!p) return;
  var pitch = document.getElementById('pitch');
  var chip = pitch.querySelector('.chip[data-id="'+playerId+'"]');
  if(!chip) return;

  var startX = ev.clientX, startY = ev.clientY;
  var moved = false;
  var pointerId = ev.pointerId;
  try { chip.setPointerCapture(pointerId); } catch(e){}

  function onMove(e){
    var dx = e.clientX - startX, dy = e.clientY - startY;
    if(!moved && (Math.abs(dx) > DRAG_THRESHOLD || Math.abs(dy) > DRAG_THRESHOLD)){
      moved = true; chip.classList.add('dragging');
    }
    if(moved){
      var rect = pitch.getBoundingClientRect();
      var x = ((e.clientX - rect.left) / rect.width) * 100;
      var y = ((e.clientY - rect.top)  / rect.height) * 100;
      x = Math.max(2, Math.min(98, x));
      y = Math.max(2, Math.min(98, y));
      p.x = x; p.y = y;
      chip.style.left = x + '%'; chip.style.top = y + '%';
      renderCounter();
    }
  }
  function onUp(e){
    chip.classList.remove('dragging');
    try { chip.releasePointerCapture(pointerId); } catch(e){}
    chip.removeEventListener('pointermove', onMove);
    chip.removeEventListener('pointerup', onUp);
    chip.removeEventListener('pointercancel', onUp);
    if(!moved){
      selectedId = playerId;
      renderRoster(); renderEditor(); renderPitchChips();
    } else {
      scheduleSave();
    }
  }
  chip.addEventListener('pointermove', onMove);
  chip.addEventListener('pointerup', onUp);
  chip.addEventListener('pointercancel', onUp);
}

function startDragFromRoster(ev, playerId){
  if(!state) return;
  ev.preventDefault();
  ev.stopPropagation();
  var p = getPlayer(playerId);
  if(!p) return;
  if(p.status === 'baja') return;

  var pitch = document.getElementById('pitch');
  var startX = ev.clientX, startY = ev.clientY;
  var moved = false;
  var pointerId = ev.pointerId;

  var ghost = document.createElement('div');
  ghost.className = 'chip';
  ghost.style.position = 'fixed';
  ghost.style.left = ev.clientX + 'px';
  ghost.style.top  = ev.clientY + 'px';
  ghost.style.width = '44px'; ghost.style.height = '44px';
  ghost.style.pointerEvents = 'none';
  ghost.style.setProperty('--chip-color', statusColors[p.status]);
  ghost.style.background = statusColors[p.status];
  ghost.style.opacity = '0.85'; ghost.style.zIndex = '9999';
  ghost.innerHTML = '<span class="chip-text">' + escapeHtml(p.shortText || '') + '</span>';

  var source = ev.target;
  try { source.setPointerCapture(pointerId); } catch(e){}

  function onMove(e){
    var dx = e.clientX - startX, dy = e.clientY - startY;
    if(!moved && (Math.abs(dx) > DRAG_THRESHOLD || Math.abs(dy) > DRAG_THRESHOLD)){
      moved = true; document.body.appendChild(ghost);
    }
    if(moved){
      ghost.style.left = e.clientX + 'px';
      ghost.style.top  = e.clientY + 'px';
      var rect = pitch.getBoundingClientRect();
      var inside = e.clientX >= rect.left && e.clientX <= rect.right
                && e.clientY >= rect.top  && e.clientY <= rect.bottom;
      pitch.classList.toggle('drop-target', inside);
    }
  }
  function onUp(e){
    try { source.releasePointerCapture(pointerId); } catch(err){}
    source.removeEventListener('pointermove', onMove);
    source.removeEventListener('pointerup', onUp);
    source.removeEventListener('pointercancel', onUp);
    pitch.classList.remove('drop-target');
    if(ghost.parentNode) ghost.parentNode.removeChild(ghost);
    if(!moved){
      selectedId = playerId;
      renderRoster(); renderEditor(); renderPitchChips();
      return;
    }
    var rect = pitch.getBoundingClientRect();
    var inside = e.clientX >= rect.left && e.clientX <= rect.right
              && e.clientY >= rect.top  && e.clientY <= rect.bottom;
    if(inside){
      var x = ((e.clientX - rect.left) / rect.width) * 100;
      var y = ((e.clientY - rect.top)  / rect.height) * 100;
      x = Math.max(2, Math.min(98, x));
      y = Math.max(2, Math.min(98, y));
      p.onPitch = true; p.x = x; p.y = y;
      selectedId = p.id;
      scheduleSave();
      renderRoster(); renderPitchChips(); renderEditor(); renderCounter();
    }
  }
  source.addEventListener('pointermove', onMove);
  source.addEventListener('pointerup', onUp);
  source.addEventListener('pointercancel', onUp);
}

// Doble clic en ficha del campo → sacar al panel
document.addEventListener('dblclick', function(ev){
  var chip = ev.target.closest('.pitch .chip');
  if(!chip) return;
  var id = chip.dataset.id;
  var p = getPlayer(id);
  if(!p) return;
  p.onPitch = false;
  scheduleSave();
  renderPitchChips(); renderRoster(); renderCounter();
});

/* =====================================================
  UTILIDADES

function escapeHtml(s){
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function toggleDark(){
  document.body.classList.toggle('dark');
  var dark = document.body.classList.contains('dark');
  document.getElementById('darkBtn').innerHTML = dark ? '☀' : '☾';
  localStorage.setItem('campograma_dark', dark ? '1' : '0');
}
function restoreDark(){
  if(localStorage.getItem('campograma_dark') === '1'){
    document.body.classList.add('dark');
    document.getElementById('darkBtn').innerHTML = '☀';
  }
}

function renderAll(){
  renderTeamBar();
  renderTeamSummary();
  renderRoster();
  renderPitchChips();
  renderEditor();
  renderCounter();
}

bootstrap();
