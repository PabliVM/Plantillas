<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campograma - Cantera RM</title>
<style>
:root{
  --bg:#f0f2f5;--surface:#fff;--surface-alt:#fafbfc;
  --border:#dfe1e6;--border-light:#eaecf0;
  --text:#1a1d23;--text-sec:#5a6170;--text-mut:#8b919e;
  --rm-blue:#2563eb;--rm-blue-lt:#3b7cf5;--rm-blue-bg:#edf1fc;
  --red:#dc2626;
  --sh-sm:0 1px 3px rgba(0,0,0,.06);--sh-lg:0 4px 16px rgba(0,0,0,.12);
  --r:8px;--rs:5px;
  --font:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
  --tr:.2s ease;
  --verde1:#1a6b2a;--verde2:#0f5220;
  --residencia-bg:#c8a800;
}
body.dark{
  --bg:#1a1d23;--surface:#23272f;--surface-alt:#2a2e36;
  --border:#3a3f4a;--border-light:#32363e;
  --text:#e4e6ea;--text-sec:#a0a5b0;--text-mut:#707580;
  --rm-blue-bg:#1e2a4a;
  --sh-sm:0 1px 3px rgba(0,0,0,.2);
  --verde1:#1a5a22;--verde2:#0d4418;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;-webkit-font-smoothing:antialiased;padding-bottom:44px;overscroll-behavior:none;}
button,input,select,textarea{font-family:inherit}

/* HEADER */
.header{background:var(--rm-blue);padding:10px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.18);}
.hlogo{width:34px;height:34px;border-radius:50%;background:#fff;flex-shrink:0;padding:2px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.hlogo img{width:100%;height:100%;object-fit:contain;}
.htitle{font-size:15px;font-weight:700;color:#fff;white-space:nowrap;}
.hspacer{flex:1}
.season-wrap{display:flex;align-items:center;gap:5px;}
.season-sel{font-size:12px;font-weight:600;background:rgba(255,255,255,.13);color:#fff;border:1px solid rgba(255,255,255,.22);border-radius:14px;padding:3px 10px;cursor:pointer;outline:none;}
.season-sel option{background:#1e3a5f;color:#fff}
.hbtn{height:28px;border-radius:14px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.12);color:#fff;cursor:pointer;display:flex;align-items:center;gap:5px;padding:0 10px;font-size:11px;font-weight:600;white-space:nowrap;transition:background var(--tr);}
.hbtn:hover{background:rgba(255,255,255,.25)}
.hbtn-icon{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.12);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:background var(--tr);}
.hbtn-icon:hover{background:rgba(255,255,255,.25)}

/* TEAM BAR */
.team-bar{background:var(--surface);padding:8px 20px;display:flex;align-items:center;gap:5px;overflow-x:auto;position:sticky;top:54px;z-index:100;border-bottom:1px solid var(--border);}
.team-bar::-webkit-scrollbar{height:0}
.team-btn{padding:4px 13px;font-size:11px;font-weight:600;border:1.5px solid var(--border);border-radius:20px;background:var(--surface);color:var(--text-sec);cursor:pointer;white-space:nowrap;transition:all var(--tr);}
.team-btn:hover{border-color:var(--rm-blue);color:var(--rm-blue)}
.team-btn.active{background:var(--rm-blue);color:#fff;border-color:var(--rm-blue)}

/* MAIN */
.main{max-width:1600px;margin:0 auto;padding:14px 20px}
.summary-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;box-shadow:var(--sh-sm);}
.summary-name{font-size:14px;font-weight:700}
.summary-name small{display:block;font-size:10px;color:var(--text-mut);margin-top:1px}
.counter{font-size:12px;font-weight:600;color:var(--text-sec);display:flex;align-items:center;gap:7px}
.cpill{background:var(--rm-blue-bg);color:var(--rm-blue);padding:3px 9px;border-radius:12px;font-weight:700;}

/* LAYOUT 3 col */
.layout{display:grid;grid-template-columns:minmax(0,1fr) 290px 270px;gap:14px;align-items:start}
@media(max-width:1120px){.layout{grid-template-columns:minmax(0,1fr) 270px}}
@media(max-width:760px){.layout{grid-template-columns:1fr}}

/* CAMPO */
.campo-outer{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;box-shadow:var(--sh-sm);display:flex;flex-direction:column;align-items:center;gap:8px;}
.campo-hint{width:100%;font-size:10px;color:var(--text-mut);font-style:italic;}
.campo-card{width:100%;max-width:546px;background:#111827;border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,.08);box-shadow:0 8px 30px rgba(0,0,0,.45);}
.campo-hdr{background:#0a1220;padding:9px 13px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.08);}
.campo-hdr-title{color:#fff;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;}
.campo-hdr-count{color:rgba(255,255,255,.55);font-size:12px;font-weight:700;}
.campo-wrap{position:relative;width:100%;padding-bottom:118%;
  background:linear-gradient(180deg,
    var(--verde1) 0%,var(--verde2) 12.5%,var(--verde1) 12.5%,var(--verde1) 25%,
    var(--verde2) 25%,var(--verde2) 37.5%,var(--verde1) 37.5%,var(--verde1) 50%,
    var(--verde2) 50%,var(--verde2) 62.5%,var(--verde1) 62.5%,var(--verde1) 75%,
    var(--verde2) 75%,var(--verde2) 87.5%,var(--verde1) 87.5%,var(--verde1) 100%);
  overflow:hidden;}
.campo-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.campo-shield{position:absolute;top:50%;left:50%;width:32%;transform:translate(-50%,-50%) translateY(-6%);opacity:.22;pointer-events:none;z-index:1;mix-blend-mode:screen;}
.campo-players{position:absolute;inset:0;z-index:2;}
.campo-wrap.drop-ok{outline:3px dashed #3b7cf5;outline-offset:-3px;}

/* FICHAS */
.player-pos{position:absolute;transform:translate(-50%,-50%);width:22%;touch-action:none;}
.player-chip{position:relative;width:100%;min-height:28px;padding:3px 4px;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.1;text-align:center;text-transform:uppercase;cursor:grab;user-select:none;-webkit-user-select:none;box-shadow:0 2px 6px rgba(0,0,0,.45);border-width:1px;border-style:solid;transition:transform .1s,box-shadow .1s;}
.player-chip.dragging{cursor:grabbing;box-shadow:0 6px 18px rgba(0,0,0,.6);transform:scale(1.07);}
.player-chip.sel{outline:3px solid #ffd400;outline-offset:1px;}
.player-chip.residencia::after{content:"R";position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:var(--residencia-bg);color:#111827;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;border:1px solid #111827;}
.pname{width:100%;font-size:9px;font-weight:500;opacity:.75;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.psurname{width:100%;font-size:11px;font-weight:800;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}

/* CARDS */
.col{display:flex;flex-direction:column;gap:10px;min-width:0}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-sm);overflow:hidden}
.card-h{padding:9px 12px;background:var(--surface-alt);border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--text-sec);letter-spacing:.3px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;gap:6px;}
.card-h .cnt{background:var(--surface);color:var(--text-sec);padding:1px 6px;border-radius:9px;font-size:10px;font-weight:700;border:1px solid var(--border);}
.card-h .card-hbtn{font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text-mut);cursor:pointer;transition:all var(--tr);}
.card-h .card-hbtn:hover{border-color:var(--rm-blue);color:var(--rm-blue)}
.card-b{padding:9px 11px}

/* ROSTER */
.rlist{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto;min-height:40px}
.ritem{display:flex;align-items:center;gap:8px;padding:5px;border-radius:var(--rs);background:var(--surface-alt);border:1px solid var(--border-light);cursor:pointer;transition:background var(--tr),border-color var(--tr);}
.ritem:hover{background:var(--rm-blue-bg);border-color:var(--rm-blue)}
.ritem.sel{border-color:var(--rm-blue);box-shadow:0 0 0 1px var(--rm-blue)}
.ritem.onpitch{opacity:.5}
.ritem-info{flex:1;min-width:0}
.ritem-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ritem-meta{font-size:9px;color:var(--text-mut);margin-top:1px}
.rempty{text-align:center;font-size:11px;color:var(--text-mut);padding:12px 6px;font-style:italic}
.chip-mini{flex-shrink:0;width:50px;min-height:24px;padding:2px 3px;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;text-transform:uppercase;border-width:1px;border-style:solid;cursor:grab;position:relative;}
.chip-mini .pname{font-size:7px;}
.chip-mini .psurname{font-size:9px;}
.chip-mini.residencia::after{content:"R";position:absolute;top:-5px;right:-5px;width:13px;height:13px;border-radius:50%;background:var(--residencia-bg);color:#111827;font-size:8px;font-weight:900;display:flex;align-items:center;justify-content:center;border:1px solid #111827;}

/* EDITOR */
.frow{display:flex;flex-direction:column;gap:3px;margin-bottom:7px}
.frow label{font-size:9px;font-weight:700;color:var(--text-mut);letter-spacing:.3px;text-transform:uppercase}
.frow input,.frow select{width:100%;padding:5px 7px;font-size:11px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);color:var(--text);}
.frow input:focus,.frow select:focus{outline:none;border-color:var(--rm-blue)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.trow{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.trow input{width:14px;height:14px;accent-color:var(--rm-blue)}
.trow label{font-size:11px;font-weight:500}
.brow{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.btn{padding:5px 10px;font-size:11px;font-weight:600;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:all var(--tr);}
.btn:hover{border-color:var(--rm-blue);color:var(--rm-blue)}
.btn.pri{background:var(--rm-blue);color:#fff;border-color:var(--rm-blue)}
.btn.pri:hover{background:var(--rm-blue-lt)}
.btn.dan{color:var(--red)}.btn.dan:hover{background:var(--red);color:#fff;border-color:var(--red)}
.btn.gho{background:transparent;border-color:transparent;color:var(--text-mut)}
.btn.gho:hover{color:var(--rm-blue);background:var(--rm-blue-bg)}
.btn.sm{padding:3px 8px;font-size:10px}
.eempty{font-size:11px;color:var(--text-mut);font-style:italic;text-align:center;padding:6px}

/* LISTA DE JUGADORES (col 3) */
.plist-group-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-mut);padding:6px 0 3px;}
.plist-item{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:var(--rs);background:var(--surface-alt);border:1px solid var(--border-light);cursor:pointer;transition:background var(--tr),border-color var(--tr);margin-bottom:3px;}
.plist-item:hover{background:var(--rm-blue-bg);border-color:var(--rm-blue)}
.plist-item.sel{border-color:var(--rm-blue);box-shadow:0 0 0 1px var(--rm-blue)}
.plist-item.onpitch{opacity:.45}
.plist-badge{flex-shrink:0;padding:2px 5px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;border-width:1px;border-style:solid;}
.plist-name{flex:1;min-width:0;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.plist-addbtn{font-size:9px;padding:2px 6px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text-mut);cursor:pointer;flex-shrink:0;transition:all var(--tr);}
.plist-addbtn:hover{border-color:var(--rm-blue);color:var(--rm-blue)}
.plist-addbtn.in{color:var(--rm-blue);border-color:var(--rm-blue);background:var(--rm-blue-bg);}
.plist-empty{text-align:center;font-size:11px;color:var(--text-mut);padding:14px;font-style:italic}

/* COLORES */
.color-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.color-row label{flex:1;font-size:11px;font-weight:600;color:var(--text-sec);}
.color-swatches{display:flex;align-items:center;gap:4px;}
.color-swatches span{font-size:9px;color:var(--text-mut);}
.color-swatches input[type=color]{width:26px;height:22px;border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;padding:1px;background:none;}
.btn-reset{font-size:10px;color:var(--text-mut);background:none;border:none;cursor:pointer;text-decoration:underline;margin-top:2px;}
.btn-reset:hover{color:var(--rm-blue)}

/* PANEL PLANTILLA (drawer inline) */
.plantilla-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-sm);overflow:hidden;display:none;}
.plantilla-panel.open{display:block;}
.plantilla-tabs{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--border);overflow-x:auto;}
.plantilla-tabs::-webkit-scrollbar{height:0}
.ptab{padding:8px 14px;font-size:11px;font-weight:600;color:var(--text-mut);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all var(--tr);background:none;border-top:none;border-left:none;border-right:none;}
.ptab:hover{color:var(--rm-blue)}
.ptab.active{color:var(--rm-blue);border-bottom-color:var(--rm-blue);}
.plantilla-body{padding:12px;}
.ptlist{display:flex;flex-direction:column;gap:4px;max-height:320px;overflow-y:auto;}
.ptitem{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--rs);background:var(--surface-alt);border:1px solid var(--border-light);}
.ptitem-badge{flex-shrink:0;padding:2px 5px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;border-width:1px;border-style:solid;}
.ptitem-name{flex:1;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ptitem-role{font-size:9px;color:var(--text-mut);flex-shrink:0;}
.ptitem-del{font-size:10px;color:var(--text-mut);background:none;border:none;cursor:pointer;padding:0 4px;flex-shrink:0;}
.ptitem-del:hover{color:var(--red)}
.pt-import{margin-top:10px;}
.pt-textarea{width:100%;min-height:90px;padding:6px 8px;font-size:11px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);color:var(--text);resize:vertical;line-height:1.4;}
.pt-textarea:focus{outline:none;border-color:var(--rm-blue)}
.pt-hint{font-size:9px;color:var(--text-mut);margin-top:4px;line-height:1.4;}
.pt-result{font-size:10px;margin-top:5px;padding:4px 7px;border-radius:var(--rs);display:none;}
.pt-result.ok{background:#dcfce7;color:#166534;border:1px solid #bbf7d0;}
.pt-result.err{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;}
body.dark .pt-result.ok{background:#14532d;color:#bbf7d0;border-color:#166534;}
body.dark .pt-result.err{background:#7f1d1d;color:#fca5a5;border-color:#991b1b;}
.pt-empty{text-align:center;font-size:11px;color:var(--text-mut);padding:18px;font-style:italic;}

/* FOOTER */
.app-footer{background:var(--rm-blue);color:rgba(255,255,255,.5);font-size:10px;text-align:center;padding:10px;position:fixed;left:0;right:0;bottom:0;z-index:50;}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="hlogo"><img src="https://raw.githubusercontent.com/PabliVM/Plantillas/main/rm.png" alt="RM" onerror="this.parentNode.textContent='RM'"></div>
  <span class="htitle">Campograma</span>
  <div class="season-wrap">
    <select id="seasonSel" class="season-sel"></select>
    <button class="hbtn" id="btnAddSeason">+ Temporada</button>
  </div>
  <span class="hspacer"></span>
  <button class="hbtn" id="btnTogglePlantilla">&#9776; Plantillas</button>
  <button class="hbtn-icon" onclick="toggleDark()" id="darkBtn">&#9790;</button>
</header>

<!-- TEAM BAR -->
<div class="team-bar" id="teamBar"></div>

<main class="main">

  <!-- PANEL PLANTILLAS (inline, debajo de la barra) -->
  <div class="plantilla-panel" id="plantillaPanel">
    <div class="plantilla-tabs" id="plantillaTabs"></div>
    <div class="plantilla-body" id="plantillaBody"></div>
  </div>

  <!-- SUMMARY -->
  <div class="summary-bar" style="margin-top:12px">
    <div class="summary-name" id="teamName">&mdash;<small id="teamKeyLabel">&mdash;</small></div>
    <div class="counter">En campo: <span class="cpill" id="counterPill">0 + 0</span></div>
  </div>

  <!-- 3 COLUMNAS -->
  <div class="layout">

    <!-- COL 1: CAMPO -->
    <div class="campo-outer">
      <span class="campo-hint">Arrastra fichas al campo &middot; Doble clic para sacarlas</span>
      <div class="campo-card">
        <div class="campo-hdr">
          <div class="campo-hdr-title" id="campoTitle">Castilla</div>
          <div class="campo-hdr-count" id="campoCount">0 + 0P</div>
        </div>
        <div class="campo-wrap" id="campoWrap">
          <svg class="campo-svg" viewBox="0 0 100 118" preserveAspectRatio="none">
            <rect x="2" y="2" width="96" height="114" fill="none" stroke="rgba(255,255,255,.55)" stroke-width=".8"/>
            <line x1="2" y1="59" x2="98" y2="59" stroke="rgba(255,255,255,.45)" stroke-width=".6"/>
            <rect x="26" y="2" width="48" height="16" fill="none" stroke="rgba(255,255,255,.38)" stroke-width=".6"/>
            <rect x="38" y="2" width="24" height="7" fill="none" stroke="rgba(255,255,255,.28)" stroke-width=".5"/>
            <rect x="26" y="100" width="48" height="16" fill="none" stroke="rgba(255,255,255,.38)" stroke-width=".6"/>
            <rect x="38" y="109" width="24" height="7" fill="none" stroke="rgba(255,255,255,.28)" stroke-width=".5"/>
          </svg>
          <svg class="campo-svg" viewBox="0 0 100 118" preserveAspectRatio="xMidYMid meet">
            <circle cx="50" cy="59" r="8.5" fill="none" stroke="rgba(255,255,255,.35)" stroke-width=".7"/>
            <circle cx="50" cy="59" r="1" fill="rgba(255,255,255,.35)"/>
          </svg>
          <img class="campo-shield" src="https://raw.githubusercontent.com/PabliVM/Plantillas/main/rm.png" alt="" onerror="this.style.display='none'">
          <div class="campo-players" id="campoPlayers"></div>
        </div>
      </div>
    </div>

    <!-- COL 2: ROSTER + EDITOR -->
    <div class="col">
      <div class="card">
        <div class="card-h">En plantilla <span class="cnt" id="cntActual">0</span></div>
        <div class="card-b"><div class="rlist" id="rosterActual"></div></div>
      </div>
      <div class="card">
        <div class="card-h">Futuribles <span class="cnt" id="cntFuturible">0</span></div>
        <div class="card-b"><div class="rlist" id="rosterFuturible"></div></div>
      </div>
      <div class="card">
        <div class="card-h">Ficha seleccionada</div>
        <div class="card-b">
          <div class="eempty" id="edEmpty">Selecciona o crea una ficha.</div>
          <div id="edForm" style="display:none">
            <div class="frow"><label>Nombre</label><input type="text" id="fName" maxlength="40"></div>
            <div class="frow"><label>Apellido</label><input type="text" id="fSurname" maxlength="40"></div>
            <div class="fgrid">
              <div class="frow"><label>Rol</label>
                <select id="fRole"><option value="CAMPO">CAMPO</option><option value="POR">POR</option></select>
              </div>
              <div class="frow"><label>Estado</label>
                <select id="fStatus">
                  <option value="actual">En plantilla</option>
                  <option value="nuevo">Nuevo fichado</option>
                  <option value="futurible">Futurible</option>
                  <option value="baja">Baja</option>
                </select>
              </div>
            </div>
            <div class="trow"><input type="checkbox" id="fRes"><label for="fRes">Residencia (R)</label></div>
            <div class="brow">
              <button class="btn dan sm" id="btnDelete">Eliminar</button>
              <button class="btn gho sm" id="btnDesel">Deseleccionar</button>
            </div>
          </div>
          <div class="brow" style="margin-top:8px">
            <button class="btn pri sm" id="btnNew">+ Añadir ficha</button>
          </div>
        </div>
      </div>
    </div>

    <!-- COL 3: LISTA + COLORES -->
    <div class="col">
      <div class="card">
        <div class="card-h">
          Lista del equipo
          <span class="cnt" id="plistTotal">0</span>
        </div>
        <div class="card-b" id="plistBody">
          <div class="plist-empty">Sin jugadores aún.</div>
        </div>
      </div>
      <div class="card">
        <div class="card-h">Colores por tipo</div>
        <div class="card-b" id="colorBox"></div>
      </div>
    </div>

  </div>
</main>

<footer class="app-footer">Cantera del Real Madrid CF &middot; Campograma</footer>

<script>
/* ════════════════════════════════════
   CONSTANTES Y DEFAULTS
════════════════════════════════════ */
var TEAMS=[
  {key:'CAS',name:'Castilla'},{key:'RMC',name:'Real Madrid C'},
  {key:'JA',name:'Juvenil A'},{key:'JB',name:'Juvenil B'},{key:'JC',name:'Juvenil C'},
  {key:'CA',name:'Cadete A'},{key:'CB',name:'Cadete B'},
  {key:'IA',name:'Infantil A'},{key:'IB',name:'Infantil B'},
  {key:'AA',name:'Alev\xedn A'},{key:'AB',name:'Alev\xedn B'},{key:'AC',name:'Alev\xedn C'},
  {key:'BA',name:'Benjam\xedn A'},{key:'BB',name:'Benjam\xedn B'},
  {key:'PA',name:'Prebenjam\xedn A'},{key:'PB',name:'Prebenjam\xedn B'},
  {key:'DB',name:'Debutante'}
];

var STATUS_DEF={
  actual:   {label:'En plantilla', bg:'#f1f5f9',text:'#1e293b',border:'#cbd5e1'},
  nuevo:    {label:'Nuevo fichado',bg:'#77ED85', text:'#003300',border:'#4ade80'},
  futurible:{label:'Futurible',    bg:'#3b82f6', text:'#ffffff',border:'#2563eb'},
  baja:     {label:'Baja',         bg:'#e53e3e', text:'#ffffff',border:'#c53030'}
};
var STATUS_ORDER=['actual','nuevo','futurible','baja'];

/* ════════════════════════════════════
   COLORES GLOBALES
════════════════════════════════════ */
var COL_KEY='campograma_colors';
var colors=(function(){
  try{
    var s=localStorage.getItem(COL_KEY);
    var saved=s?JSON.parse(s):{};
    var o={};
    STATUS_ORDER.forEach(function(k){o[k]=Object.assign({},STATUS_DEF[k],saved[k]||{});});
    return o;
  }catch(e){var o={};STATUS_ORDER.forEach(function(k){o[k]=Object.assign({},STATUS_DEF[k]);});return o;}
})();
function saveColors(){
  var m={};STATUS_ORDER.forEach(function(k){m[k]={bg:colors[k].bg,text:colors[k].text,border:colors[k].border};});
  try{localStorage.setItem(COL_KEY,JSON.stringify(m))}catch(e){}
}
function chipSt(status){
  var c=colors[status]||STATUS_DEF.actual;
  return'background:'+c.bg+';color:'+c.text+';border-color:'+c.border+';';
}

/* ════════════════════════════════════
   TEMPORADAS
════════════════════════════════════ */
var SZN_KEY='campograma_seasons', ASZN_KEY='campograma_aszn';
var seasons=(function(){try{var s=localStorage.getItem(SZN_KEY);if(s)return JSON.parse(s);}catch(e){}var y=new Date().getFullYear();return[y+'/'+(y+1)];})();
var activeSzn=localStorage.getItem(ASZN_KEY)||seasons[seasons.length-1];
if(seasons.indexOf(activeSzn)===-1)activeSzn=seasons[seasons.length-1];
function saveSeasons(){try{localStorage.setItem(SZN_KEY,JSON.stringify(seasons))}catch(e){}}
function sznKey(){return'campograma_'+activeSzn.replace('/','_')+'_';}

/* ════════════════════════════════════
   PERSISTENCIA POR EQUIPO
════════════════════════════════════ */
function saveState(k,s){try{localStorage.setItem(sznKey()+k,JSON.stringify(s))}catch(e){}}
function loadState(k){try{var r=localStorage.getItem(sznKey()+k);return r?JSON.parse(r):null}catch(e){return null}}

/* ════════════════════════════════════
   ESTADO
════════════════════════════════════ */
var ATM_KEY='campograma_atm';
var activeTeam=localStorage.getItem(ATM_KEY)||'CAS';
var state=null;
var selectedId=null;
var DRAG_T=5;
var plantillaOpen=false;
var activePtab=activeTeam;

function uid(){return'p_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7)}
function loadTeam(){
  var l=loadState(activeTeam);
  state=l||{players:[]};
  if(!state.players)state.players=[];
  selectedId=null;
}
function persist(){saveState(activeTeam,state)}
function getPlayer(id){return state.players.find(function(p){return p.id===id})}

/* ════════════════════════════════════
   TEAM BAR
════════════════════════════════════ */
function renderTeamBar(){
  var bar=document.getElementById('teamBar');bar.innerHTML='';
  TEAMS.forEach(function(t){
    var b=document.createElement('button');
    b.className='team-btn'+(t.key===activeTeam?' active':'');
    b.textContent=t.key;b.title=t.name;
    b.addEventListener('click',function(){
      if(t.key===activeTeam)return;
      activeTeam=t.key;localStorage.setItem(ATM_KEY,activeTeam);
      loadTeam();renderAll();
    });
    bar.appendChild(b);
  });
  var t=TEAMS.find(function(x){return x.key===activeTeam});
  var name=t?t.name:'\u2014';
  document.getElementById('teamName').firstChild.textContent=name;
  document.getElementById('teamKeyLabel').textContent=activeTeam;
  document.getElementById('campoTitle').textContent=name;
}

/* ════════════════════════════════════
   TEMPORADAS UI
════════════════════════════════════ */
function renderSeasonSel(){
  var sel=document.getElementById('seasonSel');sel.innerHTML='';
  seasons.forEach(function(s){
    var o=document.createElement('option');o.value=s;o.textContent=s;
    if(s===activeSzn)o.selected=true;
    sel.appendChild(o);
  });
}
function bindSeasons(){
  document.getElementById('seasonSel').addEventListener('change',function(){
    activeSzn=this.value;localStorage.setItem(ASZN_KEY,activeSzn);
    loadTeam();renderAll();
  });
  document.getElementById('btnAddSeason').addEventListener('click',function(){
    var last=seasons[seasons.length-1];
    var y=parseInt(last.split('/')[1]||last)+1;
    var next=y+'/'+(y+1);
    if(seasons.indexOf(next)!==-1){alert('Ya existe: '+next);return}
    seasons.push(next);activeSzn=next;
    saveSeasons();localStorage.setItem(ASZN_KEY,activeSzn);
    loadTeam();renderSeasonSel();renderAll();
  });
}

/* ════════════════════════════════════
   PANEL PLANTILLAS
════════════════════════════════════ */
function togglePlantilla(){
  plantillaOpen=!plantillaOpen;
  var panel=document.getElementById('plantillaPanel');
  panel.classList.toggle('open',plantillaOpen);
  if(plantillaOpen)renderPlantillaPanel();
}
function renderPlantillaPanel(){
  /* TABS: un tab por equipo */
  var tabsEl=document.getElementById('plantillaTabs');
  tabsEl.innerHTML='';
  TEAMS.forEach(function(t){
    var btn=document.createElement('button');
    btn.className='ptab'+(t.key===activePtab?' active':'');
    btn.textContent=t.key;btn.title=t.name;
    btn.addEventListener('click',function(){activePtab=t.key;renderPlantillaPanel();});
    tabsEl.appendChild(btn);
  });
  /* BODY del tab activo */
  var body=document.getElementById('plantillaBody');
  body.innerHTML='';
  var tData=loadState(activePtab)||{players:[]};
  var players=tData.players||[];
  var t=TEAMS.find(function(x){return x.key===activePtab});

  /* Lista actual */
  var listWrap=document.createElement('div');
  listWrap.className='ptlist';
  if(!players.length){
    listWrap.innerHTML='<div class="pt-empty">No hay jugadores en '+(t?t.name:activePtab)+'. Usa el formulario de abajo para cargar.</div>';
  } else {
    STATUS_ORDER.forEach(function(st){
      var grp=players.filter(function(p){return p.status===st});
      if(!grp.length)return;
      var lbl=document.createElement('div');
      lbl.style.cssText='font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-mut);padding:6px 0 3px;';
      lbl.textContent=colors[st].label+' ('+grp.length+')';
      listWrap.appendChild(lbl);
      grp.forEach(function(p){
        var row=document.createElement('div');row.className='ptitem';
        var badge=document.createElement('span');badge.className='ptitem-badge';
        badge.setAttribute('style',chipSt(p.status));badge.textContent=p.role;
        var name=document.createElement('span');name.className='ptitem-name';
        name.textContent=((p.name+' '+(p.surname||'')).trim());
        var del=document.createElement('button');del.className='ptitem-del';del.textContent='\u2715';del.title='Eliminar';
        del.addEventListener('click',function(e){
          e.stopPropagation();
          /* eliminar de ese equipo */
          var td=loadState(activePtab)||{players:[]};
          td.players=(td.players||[]).filter(function(x){return x.id!==p.id});
          saveState(activePtab,td);
          /* si es el equipo activo, refrescar */
          if(activePtab===activeTeam){loadTeam();renderAll();}
          renderPlantillaPanel();
        });
        row.appendChild(badge);row.appendChild(name);row.appendChild(del);
        listWrap.appendChild(row);
      });
    });
  }
  body.appendChild(listWrap);

  /* Formulario de carga */
  var imp=document.createElement('div');imp.className='pt-import';
  imp.innerHTML=
    '<div style="font-size:10px;font-weight:700;color:var(--text-sec);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px;">Cargar lista en '+(t?t.name:activePtab)+'</div>'+
    '<textarea class="pt-textarea" id="ptTextarea" placeholder="Apellido, Nombre, ROL, estado&#10;Ej: Garc\xeda, Mario, CAMPO, actual&#10;(ROL: CAMPO \u00f3 POR | estado: actual, nuevo, futurible, baja)"></textarea>'+
    '<div class="pt-hint">Un jugador por l\xednea. Separa campos con coma. ROL y estado son opcionales (defecto: CAMPO, actual).</div>'+
    '<div id="ptResult" class="pt-result"></div>'+
    '<div class="brow" style="margin-top:6px">'+
      '<button class="btn pri sm" id="btnPtImport">Cargar lista</button>'+
      '<button class="btn gho sm" id="btnPtClear">Limpiar</button>'+
      '<button class="btn dan sm" id="btnPtClearAll">Vaciar equipo</button>'+
    '</div>';
  body.appendChild(imp);

  document.getElementById('btnPtImport').addEventListener('click',function(){
    var raw=(document.getElementById('ptTextarea').value||'').trim();
    var res=document.getElementById('ptResult');
    if(!raw){res.style.display='block';res.className='pt-result err';res.textContent='Pega primero una lista.';return}
    var td=loadState(activePtab)||{players:[]};
    if(!td.players)td.players=[];
    var lines=raw.split('\n').map(function(l){return l.trim()}).filter(Boolean);
    var added=0,skipped=0;
    lines.forEach(function(line){
      var parts=line.split(',').map(function(s){return s.trim()});
      var surname=parts[0]||'';
      var name=parts[1]||'';
      var role=(parts[2]||'CAMPO').toUpperCase();if(role!=='POR')role='CAMPO';
      var rawSt=(parts[3]||'actual').toLowerCase().replace(/\s+/g,'');
      var stMap={'enplantilla':'actual','actual':'actual','nuevo':'nuevo','nuevofichado':'nuevo','futurible':'futurible','baja':'baja'};
      var status=stMap[rawSt]||'actual';
      if(!surname&&!name){skipped++;return}
      var exists=td.players.some(function(p){return p.surname===surname&&p.name===name});
      if(exists){skipped++;return}
      td.players.push({id:uid(),name:name,surname:surname,role:role,status:status,residence:false,onPitch:false,x:50,y:59});
      added++;
    });
    saveState(activePtab,td);
    if(activePtab===activeTeam){loadTeam();renderAll();}
    res.style.display='block';
    if(added>0){res.className='pt-result ok';res.textContent='\u2713 '+added+' jugador'+(added!==1?'es':'')+' a\xf1adido'+(added!==1?'s':'')+(skipped?' \u00b7 '+skipped+' omitido'+(skipped!==1?'s':''):'')+'.';}
    else{res.className='pt-result err';res.textContent='No se a\xf1adi\xf3 ning\xfan jugador (duplicados o formato err\xf3neo).';}
    renderPlantillaPanel();
  });
  document.getElementById('btnPtClear').addEventListener('click',function(){
    document.getElementById('ptTextarea').value='';
    document.getElementById('ptResult').style.display='none';
  });
  document.getElementById('btnPtClearAll').addEventListener('click',function(){
    if(!confirm('\xbfVaciar toda la plantilla de '+(t?t.name:activePtab)+'?'))return;
    saveState(activePtab,{players:[]});
    if(activePtab===activeTeam){loadTeam();renderAll();}
    renderPlantillaPanel();
  });
}

/* ════════════════════════════════════
   CONTADOR
════════════════════════════════════ */
var PZ={top:{x1:26,y1:0,x2:74,y2:16},bot:{x1:26,y1:100,x2:74,y2:118}};
function inGoal(x,y){return(x>=PZ.top.x1&&x<=PZ.top.x2&&y>=PZ.top.y1&&y<=PZ.top.y2)||(x>=PZ.bot.x1&&x<=PZ.bot.x2&&y>=PZ.bot.y1&&y<=PZ.bot.y2);}
function count(){
  var c=0,p=0;
  state.players.forEach(function(pl){
    if(!pl.onPitch||pl.status==='baja')return;
    if(pl.role==='POR'&&inGoal(pl.x,pl.y))p++;else c++;
  });
  return{c:c,p:p};
}
function renderCounter(){
  var r=count();
  document.getElementById('counterPill').textContent=r.c+' + '+r.p;
  document.getElementById('campoCount').textContent=r.c+' + '+r.p+'P';
}

/* ════════════════════════════════════
   RENDER CAMPO
════════════════════════════════════ */
function renderCampo(){
  var cont=document.getElementById('campoPlayers');cont.innerHTML='';
  state.players.forEach(function(p){
    if(!p.onPitch)return;
    var pos=document.createElement('div');pos.className='player-pos';
    pos.style.left=p.x+'%';pos.style.top=p.y*(100/118)+'%';pos.dataset.id=p.id;
    var chip=document.createElement('div');
    chip.className='player-chip'+(p.residence?' residencia':'')+(p.id===selectedId?' sel':'');
    chip.setAttribute('style',chipSt(p.status));
    chip.innerHTML='<span class="pname">'+esc(p.name)+'</span><span class="psurname">'+esc(p.surname||'')+'</span>';
    pos.appendChild(chip);
    chip.addEventListener('pointerdown',function(ev){dragOnCampo(ev,p.id)});
    cont.appendChild(pos);
  });
}

/* ════════════════════════════════════
   RENDER ROSTER (col 2)
════════════════════════════════════ */
function renderRoster(){
  var ab=document.getElementById('rosterActual'),fb=document.getElementById('rosterFuturible');
  ab.innerHTML='';fb.innerHTML='';
  var actual=[],fut=[];
  state.players.forEach(function(p){if(p.status==='futurible')fut.push(p);else actual.push(p)});
  function mkItem(p){
    var item=document.createElement('div');
    item.className='ritem'+(p.id===selectedId?' sel':'')+(p.onPitch?' onpitch':'');
    var mini=document.createElement('div');
    mini.className='chip-mini'+(p.residence?' residencia':'');
    mini.setAttribute('style',chipSt(p.status));
    mini.innerHTML='<span class="pname">'+esc(p.name)+'</span><span class="psurname">'+esc(p.surname||'')+'</span>';
    var info=document.createElement('div');info.className='ritem-info';
    info.innerHTML='<div class="ritem-name">'+esc(((p.name+' '+(p.surname||'')).trim()))+'</div>'
                  +'<div class="ritem-meta">'+p.role+' \xb7 '+(colors[p.status]||STATUS_DEF.actual).label+(p.onPitch?' \xb7 en campo':'')+'</div>';
    item.appendChild(mini);item.appendChild(info);
    item.addEventListener('click',function(){selectedId=p.id;renderRoster();renderEditor();renderCampo();renderPlist();});
    mini.addEventListener('pointerdown',function(ev){dragFromRoster(ev,p.id)});
    return item;
  }
  if(!actual.length)ab.innerHTML='<div class="rempty">Sin jugadores. Carga una plantilla o a\xf1ade fichas.</div>';
  else actual.forEach(function(p){ab.appendChild(mkItem(p))});
  if(!fut.length)fb.innerHTML='<div class="rempty">Sin futuribles.</div>';
  else fut.forEach(function(p){fb.appendChild(mkItem(p))});
  document.getElementById('cntActual').textContent=actual.length;
  document.getElementById('cntFuturible').textContent=fut.length;
}

/* ════════════════════════════════════
   RENDER LISTA (col 3)
════════════════════════════════════ */
function renderPlist(){
  var body=document.getElementById('plistBody');body.innerHTML='';
  var total=state.players.length;
  document.getElementById('plistTotal').textContent=total;
  if(!total){body.innerHTML='<div class="plist-empty">Sin jugadores a\xfan.</div>';return}
  STATUS_ORDER.forEach(function(st){
    var grp=state.players.filter(function(p){return p.status===st});
    if(!grp.length)return;
    var lbl=document.createElement('div');lbl.className='plist-group-label';
    lbl.textContent=(colors[st]||STATUS_DEF[st]).label+' ('+grp.length+')';
    body.appendChild(lbl);
    grp.forEach(function(p){
      var row=document.createElement('div');
      row.className='plist-item'+(p.id===selectedId?' sel':'')+(p.onPitch?' onpitch':'');
      var badge=document.createElement('div');badge.className='plist-badge';
      badge.setAttribute('style',chipSt(p.status));badge.textContent=p.role;
      var name=document.createElement('div');name.className='plist-name';
      name.textContent=(p.name+' '+(p.surname||'')).trim();
      var addBtn=document.createElement('button');addBtn.className='plist-addbtn'+(p.onPitch?' in':'');
      addBtn.textContent=p.onPitch?'En campo':'+ Campo';
      addBtn.addEventListener('click',function(e){
        e.stopPropagation();
        if(p.status==='baja')return;
        if(!p.onPitch){p.onPitch=true;selectedId=p.id;persist();renderAll();}
      });
      row.appendChild(badge);row.appendChild(name);row.appendChild(addBtn);
      row.addEventListener('click',function(){selectedId=p.id;renderRoster();renderEditor();renderCampo();renderPlist();});
      body.appendChild(row);
    });
  });
}

/* ════════════════════════════════════
   RENDER EDITOR
════════════════════════════════════ */
function renderEditor(){
  var empty=document.getElementById('edEmpty'),form=document.getElementById('edForm');
  if(!selectedId){empty.style.display='block';form.style.display='none';return}
  var p=getPlayer(selectedId);
  if(!p){selectedId=null;empty.style.display='block';form.style.display='none';return}
  empty.style.display='none';form.style.display='block';
  document.getElementById('fName').value=p.name;
  document.getElementById('fSurname').value=p.surname||'';
  document.getElementById('fRole').value=p.role;
  document.getElementById('fStatus').value=p.status;
  document.getElementById('fRes').checked=!!p.residence;
}
function updatePlayer(id,patch){
  var p=getPlayer(id);if(!p)return;
  Object.keys(patch).forEach(function(k){p[k]=patch[k]});
  if(p.status==='baja'&&p.onPitch)p.onPitch=false;
  persist();renderRoster();renderCampo();renderCounter();renderPlist();
}
function bindEditor(){
  document.getElementById('fName').addEventListener('input',function(){if(selectedId)updatePlayer(selectedId,{name:this.value})});
  document.getElementById('fSurname').addEventListener('input',function(){if(selectedId)updatePlayer(selectedId,{surname:this.value})});
  document.getElementById('fRole').addEventListener('change',function(){if(selectedId)updatePlayer(selectedId,{role:this.value})});
  document.getElementById('fStatus').addEventListener('change',function(){if(selectedId)updatePlayer(selectedId,{status:this.value})});
  document.getElementById('fRes').addEventListener('change',function(){if(selectedId)updatePlayer(selectedId,{residence:this.checked})});
  document.getElementById('btnDelete').addEventListener('click',function(){
    if(!selectedId||!confirm('\xbfEliminar esta ficha?'))return;
    state.players=state.players.filter(function(p){return p.id!==selectedId});
    selectedId=null;persist();renderAll();
  });
  document.getElementById('btnDesel').addEventListener('click',function(){
    selectedId=null;renderRoster();renderCampo();renderEditor();renderPlist();
  });
  document.getElementById('btnNew').addEventListener('click',function(){
    var p={id:uid(),name:'',surname:'Jugador',role:'CAMPO',status:'actual',residence:false,onPitch:false,x:50,y:59};
    state.players.push(p);selectedId=p.id;persist();renderAll();
  });
}

/* ════════════════════════════════════
   COLORES
════════════════════════════════════ */
function renderColors(){
  var box=document.getElementById('colorBox');box.innerHTML='';
  STATUS_ORDER.forEach(function(k){
    var c=colors[k];
    var row=document.createElement('div');row.className='color-row';
    row.innerHTML='<label>'+c.label+'</label>'
      +'<div class="color-swatches">'
      +'<span>Fondo</span><input type="color" value="'+c.bg+'" data-k="'+k+'" data-p="bg">'
      +'<span>Texto</span><input type="color" value="'+c.text+'" data-k="'+k+'" data-p="text">'
      +'</div>';
    box.appendChild(row);
  });
  var rst=document.createElement('button');rst.className='btn-reset';rst.textContent='Restablecer colores';
  box.appendChild(rst);
  box.querySelectorAll('input[type=color]').forEach(function(inp){
    inp.addEventListener('input',function(){
      var k=this.dataset.k,prop=this.dataset.p;
      colors[k][prop]=this.value;
      if(prop==='bg')colors[k].border=this.value;
      saveColors();renderCampo();renderRoster();renderPlist();
      if(plantillaOpen)renderPlantillaPanel();
    });
  });
  rst.addEventListener('click',function(){
    STATUS_ORDER.forEach(function(k){colors[k]=Object.assign({},STATUS_DEF[k]);});
    saveColors();renderColors();renderCampo();renderRoster();renderPlist();
    if(plantillaOpen)renderPlantillaPanel();
  });
}

/* ════════════════════════════════════
   DRAG ON CAMPO
════════════════════════════════════ */
function dragOnCampo(ev,pid){
  ev.preventDefault();
  var p=getPlayer(pid);if(!p)return;
  var wrap=document.getElementById('campoWrap');
  var pos=wrap.querySelector('.player-pos[data-id="'+pid+'"]');
  var chip=pos&&pos.querySelector('.player-chip');
  if(!pos||!chip)return;
  var sx=ev.clientX,sy=ev.clientY,moved=false,ptr=ev.pointerId;
  try{chip.setPointerCapture(ptr)}catch(e){}
  function mv(e){
    if(!moved&&(Math.abs(e.clientX-sx)>DRAG_T||Math.abs(e.clientY-sy)>DRAG_T)){moved=true;chip.classList.add('dragging')}
    if(moved){
      var r=wrap.getBoundingClientRect();
      var x=Math.max(2,Math.min(98,((e.clientX-r.left)/r.width)*100));
      var yPct=Math.max(2,Math.min(98,((e.clientY-r.top)/r.height)*100));
      p.x=x;p.y=yPct*(118/100);
      pos.style.left=x+'%';pos.style.top=yPct+'%';renderCounter();
    }
  }
  function up(){
    chip.classList.remove('dragging');
    try{chip.releasePointerCapture(ptr)}catch(e){}
    chip.removeEventListener('pointermove',mv);chip.removeEventListener('pointerup',up);chip.removeEventListener('pointercancel',up);
    if(!moved){selectedId=pid;renderRoster();renderEditor();renderCampo();renderPlist();}
    else persist();
  }
  chip.addEventListener('pointermove',mv);chip.addEventListener('pointerup',up);chip.addEventListener('pointercancel',up);
}

/* ════════════════════════════════════
   DRAG FROM ROSTER
════════════════════════════════════ */
function dragFromRoster(ev,pid){
  ev.preventDefault();ev.stopPropagation();
  var p=getPlayer(pid);if(!p||p.status==='baja')return;
  var wrap=document.getElementById('campoWrap');
  var sx=ev.clientX,sy=ev.clientY,moved=false,ptr=ev.pointerId;
  var ghost=document.createElement('div');
  ghost.className='player-chip'+(p.residence?' residencia':'');
  ghost.setAttribute('style','position:fixed;width:58px;pointer-events:none;opacity:.88;z-index:9999;'+chipSt(p.status));
  ghost.innerHTML='<span class="pname">'+esc(p.name)+'</span><span class="psurname">'+esc(p.surname||'')+'</span>';
  ghost.style.left=ev.clientX+'px';ghost.style.top=ev.clientY+'px';
  var src=ev.target;try{src.setPointerCapture(ptr)}catch(e){}
  function mv(e){
    if(!moved&&(Math.abs(e.clientX-sx)>DRAG_T||Math.abs(e.clientY-sy)>DRAG_T)){moved=true;document.body.appendChild(ghost)}
    if(moved){
      ghost.style.left=e.clientX+'px';ghost.style.top=e.clientY+'px';
      var r=wrap.getBoundingClientRect();
      wrap.classList.toggle('drop-ok',e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom);
    }
  }
  function up(e){
    try{src.releasePointerCapture(ptr)}catch(err){}
    src.removeEventListener('pointermove',mv);src.removeEventListener('pointerup',up);src.removeEventListener('pointercancel',up);
    wrap.classList.remove('drop-ok');if(ghost.parentNode)ghost.parentNode.removeChild(ghost);
    if(!moved){selectedId=pid;renderRoster();renderEditor();renderCampo();renderPlist();return}
    var r=wrap.getBoundingClientRect();
    if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom){
      var x=Math.max(2,Math.min(98,((e.clientX-r.left)/r.width)*100));
      var yPct=Math.max(2,Math.min(98,((e.clientY-r.top)/r.height)*100));
      p.onPitch=true;p.x=x;p.y=yPct*(118/100);
      selectedId=p.id;persist();renderAll();
    }
  }
  src.addEventListener('pointermove',mv);src.addEventListener('pointerup',up);src.addEventListener('pointercancel',up);
}

/* Doble clic → sacar del campo */
document.addEventListener('dblclick',function(ev){
  var pos=ev.target.closest('.campo-players .player-pos');if(!pos)return;
  var p=getPlayer(pos.dataset.id);if(!p)return;
  p.onPitch=false;persist();renderCampo();renderRoster();renderCounter();renderPlist();
});

/* ════════════════════════════════════
   UTILS
════════════════════════════════════ */
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function toggleDark(){document.body.classList.toggle('dark');var d=document.body.classList.contains('dark');document.getElementById('darkBtn').innerHTML=d?'\u2600':'\u263e';localStorage.setItem('campograma_dark',d?'1':'0')}
function restoreDark(){if(localStorage.getItem('campograma_dark')==='1'){document.body.classList.add('dark');document.getElementById('darkBtn').innerHTML='\u2600'}}

function renderAll(){
  renderTeamBar();
  renderRoster();
  renderCampo();
  renderEditor();
  renderCounter();
  renderPlist();
}

   BOOT
════════════════════════════════════ */
loadTeam();
bindEditor();
bindSeasons();
document.getElementById('btnTogglePlantilla').addEventListener('click',function(){
  activePtab=activeTeam;togglePlantilla();
});
renderSeasonSel();
renderColors();
restoreDark();
renderAll();
</script>
